<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SONAR 手机端预览</title><style>:root{--green:#b9ff00;--bg:#020403;--line:rgba(185,255,0,.22);--text:#f5f7f0;--muted:#a7b1a3}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 20% 0,rgba(185,255,0,.1),transparent 28%),#020403;color:var(--text);font-family:Inter,Arial,"Microsoft YaHei",sans-serif;padding:18px}.top{width:min(980px,100%);margin:0 auto 16px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}.top img{width:180px;mix-blend-mode:screen}.links{display:flex;gap:10px;flex-wrap:wrap}.links a{height:44px;display:flex;align-items:center;padding:0 14px;border:1px solid var(--line);border-radius:999px;color:var(--text);text-decoration:none;background:rgba(255,255,255,.03)}.links a:hover{background:rgba(185,255,0,.1);color:var(--green)}.stage{width:min(620px,100%);margin:auto;padding:24px;border:1px solid var(--line);border-radius:32px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01));box-shadow:0 22px 60px rgba(0,0,0,.45)}.device{width:390px;height:844px;margin:auto;border:12px solid #111;border-radius:44px;overflow:hidden;background:#000;box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.08) inset;position:relative}.device:before{content:"手机视口 390×844";position:absolute;left:18px;top:12px;z-index:2;color:rgba(185,255,0,.8);font-size:12px;pointer-events:none}.device:after{content:"";position:absolute;left:50%;bottom:8px;width:120px;height:5px;border-radius:999px;background:rgba(255,255,255,.18);transform:translateX(-50%);pointer-events:none}.device iframe{width:390px;height:844px;border:0;display:block}.note{color:var(--muted);text-align:center;font-size:12px;line-height:1.7;margin:14px 0 0}@media(max-width:520px){.stage{padding:10px}.device{width:100%;height:calc((100vw - 56px) * 844 / 390)}.device iframe{width:390px;height:844px;transform-origin:top left;transform:scale(calc((100vw - 56px) / 390))}}</style></head><body><header class="top"><a href="index.html"><img src="assets/brand/sonar-wordmark.png" alt="SONAR"></a><nav class="links"><a href="sonar_homepage/index.html" target="preview">首页</a><a href="sonar_search_page/index.html" target="preview">游戏库搜索</a><a href="sonar_library_page/index.html" target="preview">死亡空间百科</a><a href="index.html">返回入口</a></nav></header><main class="stage"><div class="device"><iframe name="preview" src="sonar_homepage/index.html"></iframe></div><p class="note">该入口用于在 PC 上检查手机端的顶部安全区、底部手势死区与单手触控范围。</p></main></body></html>
